{% extends "blog/base.html" %}

{% block title %}
Iniciar sesión
{% endblock %}

{% block content %}

<div class="row justify-content-center">

```
<div class="col-md-5">

    <div class="card shadow">

        <div class="card-header bg-dark text-white">

            <h3 class="mb-0 text-center">

                Iniciar sesión

            </h3>

        </div>

        <div class="card-body">

            {% if form.errors %}

                <div class="alert alert-danger">

                    Usuario o contraseña incorrectos.

                </div>

            {% endif %}

            <form method="post">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">

                        Usuario

                    </label>

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Contraseña

                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary w-100">

                    Iniciar sesión

                </button>

            </form>

        </div>

    </div>

</div>
```

</div>

{% endblock %}
