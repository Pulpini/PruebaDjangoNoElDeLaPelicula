{% extends 'blog/base.html' %}
{% block titulo %}{{ accion }} Artículo{% endblock %}
{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h1 class="mb-4">{{ accion }} Artículo</h1>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="{{ form.titulo.id_for_label }}" class="form-label">{{ form.titulo.label }}</label>
                {{ form.titulo }}
                {% if form.titulo.errors %}
                    <div class="text-danger">{{ form.titulo.errors }}</div>
                {% endif %}
            </div>
            <div class="mb-3">
                <label for="{{ form.contenido.id_for_label }}" class="form-label">{{ form.contenido.label }}</label>
                {{ form.contenido }}
            </div>
            <div class="mb-3 form-check">
                {{ form.publicado }}
                <label class="form-check-label" for="{{ form.publicado.id_for_label }}">
                    {{ form.publicado.label }}
                </label>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">{{ accion }}</button>
                <a href="{% url 'lista_articulos' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
