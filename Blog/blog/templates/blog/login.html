{% extends "blog/base.html" %}

<!--
==========================================================
LOGIN

Utiliza Authentication de Django.

La variable "form"

es creada automáticamente
por LoginView.

==========================================================
-->

{% block titulo %}

Iniciar sesión

{% endblock %}


{% block contenido %}

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow">

<div class="card-header">

<h2>

Iniciar sesión

</h2>

</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button
class="btn btn-primary w-100">

Ingresar

</button>

</form>

</div>

</div>

</div>

</div>


{% endblock %}
