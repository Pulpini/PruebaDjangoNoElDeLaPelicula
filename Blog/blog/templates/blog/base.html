<!DOCTYPE html>
<html lang="es">

<head>

    <!-- ==========================================================
         Configuración básica del documento HTML
    =========================================================== -->

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <!--
        block titulo

        Permite que cada página cambie el título del navegador.

        Ejemplo:

        Lista de artículos
        Crear artículo
        Login
    -->

    <title>

        Mi Blog |

        {% block titulo %}

            Inicio

        {% endblock %}

    </title>

    <!-- ==========================================================
         Bootstrap 5
         Framework CSS utilizado para el diseño.
    =========================================================== -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>


<!-- ==========================================================
     BARRA DE NAVEGACIÓN
========================================================== -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <!-- Logo del sitio -->

        <a class="navbar-brand"
           href="{% url 'lista_articulos' %}">

            📝 Mi Blog

        </a>


        <div class="ms-auto d-flex align-items-center gap-3">

            <!--
                user.is_authenticated

                Django verifica automáticamente
                si el usuario inició sesión.
            -->

            {% if user.is_authenticated %}

                <span class="text-light">

                    Bienvenido

                    <strong>

                        {{ user.username }}

                    </strong>

                </span>

                <a href="{% url 'crear_articulo' %}"
                   class="btn btn-success btn-sm">

                    Nuevo artículo

                </a>


                <!--
                    Logout

                    Se realiza mediante POST
                    para mayor seguridad.
                -->

                <form
                    method="post"
                    action="{% url 'logout' %}">

                    {% csrf_token %}

                    <button
                        class="btn btn-outline-light btn-sm">

                        Cerrar sesión

                    </button>

                </form>

            {% else %}

                <a
                    href="{% url 'login' %}"
                    class="btn btn-outline-light btn-sm">

                    Iniciar sesión

                </a>

            {% endif %}

        </div>

    </div>

</nav>



<!-- ==========================================================
     CONTENIDO PRINCIPAL
========================================================== -->

<main class="container mt-4">


    <!--
        Sistema de mensajes de Django

        messages.success()

        messages.error()

        messages.warning()

    -->

    {% if messages %}

        {% for message in messages %}

            <div class="alert alert-{{ message.tags }}
                        alert-dismissible fade show">

                {{ message }}

                <button
                    class="btn-close"
                    data-bs-dismiss="alert">

                </button>

            </div>

        {% endfor %}

    {% endif %}



    <!--
        Aquí cada página insertará
        su propio contenido.
    -->

    {% block contenido %}

    {% endblock %}


</main>


<!-- ==========================================================
     Bootstrap JavaScript
========================================================== -->

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>

</body>

</html>
